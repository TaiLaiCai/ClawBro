services:
  oc-a:
    image: coollabsio/openclaw:latest
    container_name: oc-a
    restart: unless-stopped
    env_file:
      - /opt/openclaw-fleet/workers/a/env/worker.env
    environment:
      OPENCLAW_NO_RESPAWN: "1"
    entrypoint: ["/bin/bash","/app/scripts/entrypoint-worker.sh"]
    ports:
      - "18081:8080"
    volumes:
      - /opt/openclaw-fleet/workers/a/data:/data
      - /opt/openclaw-fleet/workers/a/workspace:/data/workspace
      - /opt/openclaw-fleet/workers/a/config/openclaw.json:/app/config/openclaw.json:ro
      - /opt/openclaw-fleet/compose/entrypoint-worker.sh:/app/scripts/entrypoint-worker.sh:ro

